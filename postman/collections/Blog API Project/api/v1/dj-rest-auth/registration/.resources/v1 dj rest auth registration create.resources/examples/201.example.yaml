$kind: http-example
request:
  url: "{{baseUrl}}/api/v1/dj-rest-auth/registration/"
  method: POST
  headers:
    - key: Content-Type
      value: application/json
    - key: Accept
      value: application/json
    - key: sessionid
      value: <API Key>
      description: "Added as a part of security scheme: apikey"
  body:
    type: json
    content: |-
      {
        "email": "SUYuma8E9B@vjaaojNcBcSJTxIBdfDutZvFmUJlboJ.jjgk",
        "password1": "string",
        "password2": "string",
        "username": "string"
      }
response:
  statusCode: 201
  statusText: Created
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "key": "string"
      }
order: 1000
