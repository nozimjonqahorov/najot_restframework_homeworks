$kind: http-example
request:
  url: "{{baseUrl}}/api/v1/dj-rest-auth/user/"
  method: GET
  headers:
    - key: Accept
      value: application/json
    - key: sessionid
      value: <API Key>
      description: "Added as a part of security scheme: apikey"
response:
  statusCode: 200
  statusText: OK
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "email": "vRTtH0BGjeWLnp@vKQKkzuk.brte",
        "pk": 2937,
        "username": "yxDhPPZZ",
        "first_name": "string",
        "last_name": "string"
      }
order: 1000
