$kind: http-request
description: |-
  Reads and updates UserModel fields
  Accepts GET, PUT, PATCH methods.

  Default accepted fields: username, first_name, last_name
  Default display fields: pk, username, email, first_name, last_name
  Read-only fields: pk, email

  Returns UserModel fields.
url: "{{baseUrl}}/api/v1/dj-rest-auth/user/"
method: PUT
headers:
  Content-Type: application/json
  Accept: application/json
body:
  type: json
  content: |-
    {
      "username": "JQ3CGj3DN",
      "first_name": "string",
      "last_name": "string"
    }
auth:
  type: apikey
  credentials:
    key: sessionid
    value: "{{apiKey}}"
    in: header
examples: ./.resources/v1 dj rest auth user update.resources/examples
order: 2000
