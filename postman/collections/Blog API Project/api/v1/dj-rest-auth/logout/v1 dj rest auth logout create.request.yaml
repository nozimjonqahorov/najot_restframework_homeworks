$kind: http-request
description: |-
  Calls Django logout method and delete the Token object
  assigned to the current User object.

  Accepts/Returns nothing.
url: "{{baseUrl}}/api/v1/dj-rest-auth/logout/"
method: POST
headers:
  Accept: application/json
auth:
  type: apikey
  credentials:
    key: sessionid
    value: "{{apiKey}}"
    in: header
examples: ./.resources/v1 dj rest auth logout create.resources/examples
order: 1000
