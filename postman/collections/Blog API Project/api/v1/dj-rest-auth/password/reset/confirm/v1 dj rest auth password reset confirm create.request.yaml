$kind: http-request
description: |-
  Password reset e-mail link is confirmed, therefore
  this resets the user's password.

  Accepts the following POST parameters: token, uid,
      new_password1, new_password2
  Returns the success/fail message.
url: "{{baseUrl}}/api/v1/dj-rest-auth/password/reset/confirm/"
method: POST
headers:
  Content-Type: application/json
  Accept: application/json
body:
  type: json
  content: |-
    {
      "new_password1": "string",
      "new_password2": "string",
      "token": "string",
      "uid": "string"
    }
auth:
  type: apikey
  credentials:
    key: sessionid
    value: "{{apiKey}}"
    in: header
examples: ./.resources/v1 dj rest auth password reset confirm create.resources/examples
order: 1000
