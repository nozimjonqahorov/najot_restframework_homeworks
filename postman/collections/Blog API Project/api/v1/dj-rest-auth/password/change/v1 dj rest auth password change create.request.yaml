$kind: http-request
description: |-
  Calls Django Auth SetPasswordForm save method.

  Accepts the following POST parameters: new_password1, new_password2
  Returns the success/fail message.
url: "{{baseUrl}}/api/v1/dj-rest-auth/password/change/"
method: POST
headers:
  Content-Type: application/json
  Accept: application/json
body:
  type: json
  content: |-
    {
      "new_password1": "string",
      "new_password2": "string"
    }
auth:
  type: apikey
  credentials:
    key: sessionid
    value: "{{apiKey}}"
    in: header
examples: ./.resources/v1 dj rest auth password change create.resources/examples
order: 1000
