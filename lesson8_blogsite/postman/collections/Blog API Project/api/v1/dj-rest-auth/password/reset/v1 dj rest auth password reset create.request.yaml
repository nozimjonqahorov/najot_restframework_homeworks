$kind: http-request
description: |-
  Calls Django Auth PasswordResetForm save method.

  Accepts the following POST parameters: email
  Returns the success/fail message.
url: "{{baseUrl}}/api/v1/dj-rest-auth/password/reset/"
method: POST
headers:
  Content-Type: application/json
  Accept: application/json
body:
  type: json
  content: |-
    {
      "email": "Dl7T3HbK@HMXNwrGkFTVCyinLz.fzet"
    }
auth:
  type: apikey
  credentials:
    key: sessionid
    value: "{{apiKey}}"
    in: header
examples: ./.resources/v1 dj rest auth password reset create.resources/examples
order: 2000
