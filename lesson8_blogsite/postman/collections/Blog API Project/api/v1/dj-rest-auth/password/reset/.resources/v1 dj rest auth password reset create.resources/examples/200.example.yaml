$kind: http-example
request:
  url: "{{baseUrl}}/api/v1/dj-rest-auth/password/reset/"
  method: POST
  headers:
    - key: Content-Type
      value: application/json
    - key: Accept
      value: application/json
    - key: sessionid
      value: <API Key>
      description: "Added as a part of security scheme: apikey"
  body:
    type: json
    content: |-
      {
        "email": "Dl7T3HbK@HMXNwrGkFTVCyinLz.fzet"
      }
response:
  statusCode: 200
  statusText: OK
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "detail": "string"
      }
order: 1000
