$kind: http-example
request:
  url: "{{baseUrl}}/api/v1/dj-rest-auth/login/"
  method: POST
  headers:
    - key: Content-Type
      value: application/json
    - key: Accept
      value: application/json
    - key: sessionid
      value: <API Key>
      description: "Added as a part of security scheme: apikey"
  body:
    type: json
    content: |-
      {
        "password": "string",
        "username": "string",
        "email": "gY-G8@WPjyEFt.jw"
      }
response:
  statusCode: 200
  statusText: OK
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "key": "string"
      }
order: 1000
